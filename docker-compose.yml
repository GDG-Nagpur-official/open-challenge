version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: api_management_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - api_network

  mongodb:
    image: mongo:7.0
    container_name: api_management_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: api_management
    volumes:
      - mongodb_data:/data/db
    networks:
      - api_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api_management_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/api_management
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DEFAULT_TTL=300
    depends_on:
      - mongodb
      - redis
    networks:
      - api_network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: api_management_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - api_network

volumes:
  mongodb_data:
  redis_data:

networks:
  api_network:
    driver: bridge
